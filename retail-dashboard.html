<style>
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#eef2f6}

<body class="pb-12">

<script>
const CONFIG = {
  nama_perusahaan: "PT Toko Makmur",
  warna_primer: "#059669",
  spreadsheet_id: "1UThEwKI6CSiNFJ-0H3bcVeLn1Ahl_MBkQqxg5uh0yNo",   // <- ID dari URL Google Sheets
  sheets: {                                          // biarkan apa adanya; otomatis terbentuk dari ID
    master:  "MASTER_TOKO",

};

<!-- HEADER -->

<div class="bg-white border-b border-gray-200 px-4 md:px-6 py-3 sticky z-30" style="top:64px">

<script>
// ════════════ STATE ════════════
let DATA = { master:[], f1:[], f2:[], action:[], log:[] };
let VIEW = { master:[], f1:[], f2:[], action:[], log:[] };
let MODE = 'DEMO';
const CHARTS = {};
const TODAY = new Date('2026-06-08T23:59:59');
const num = v => { const n=parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; };
const fmtRp = n => 'Rp'+Math.round(num(n)).toLocaleString('id-ID');
const D = s => s ? new Date(String(s).slice(0,10)+'T00:00:00') : null;
const daysBetween=(a,b)=>Math.round((b-a)/864e5);

// ════════════ SAMPLE DATA (DEMO) ════════════
function SAMPLE(){
  const toko=[
    ['M01','MAKMUR DARMO','Surabaya-1','A','Budi S.','Andi P.',4000000,3500000],
    ['M07','MAKMUR PACUAN KUDA','Surabaya-1','A','Budi S.','Dani P.',3500000,3000000],
    ['M12','MAKMUR RUNGKUT','Surabaya-2','B','Sari W.','Eka R.',2800000,2500000],
    ['M19','MAKMUR KETINTANG','Surabaya-2','B','Sari W.','Hartono',2500000,2200000],
    ['M22','MAKMUR PONDOK JATI','Sidoarjo-1','B','Rudi H.','Lina S.',2200000,2000000],
    ['M28','MAKMUR GEDANGAN','Sidoarjo-1','C','Rudi H.','Maya T.',1800000,1600000],
  ];
  const master=toko.map(t=>({kode_toko:t[0],nama_toko:t[1],area:t[2],cluster:t[3],arco:t[4],store_leader:t[5],status:'Aktif',target_setoran:t[6],ideal_kas:t[7]}));
  let seed=42; const rnd=()=>{seed=(seed*9301+49297)%233280;return seed/233280;};
  const pick=a=>a[Math.floor(rnd()*a.length)];
  const gradeOf=s=>s>=90?'ANDALAN':s>=80?'BAIK':s>=65?'CUKUP':s>=45?'PERLU PERHATIAN':'KRITIS';
  const belumPool=['Cek expired','Display planogram','Briefing promo','Opname cepat','POP promo','Setoran tepat waktu','Kebersihan toilet'];
  const f1=[],log=[],action=[],f2=[];
  for(let d=6;d>=0;d--){
    const tgl=new Date(TODAY); tgl.setDate(tgl.getDate()-d);
    const ds=tgl.toISOString().slice(0,10);
    master.forEach(m=>{
      ['PAGI','SIANG'].forEach(sh=>{
        const base=m.cluster==='A'?88:m.cluster==='B'?80:72;
        const sop=Math.min(100,Math.max(55,Math.round(base+(rnd()*20-10))));
        const tuntas=Math.round(sop/100*16),belum=16-tuntas;
        const belumItems=[]; for(let i=0;i<Math.min(belum,3);i++)belumItems.push(pick(belumPool));
        const kb=+(3.2+rnd()*1.7).toFixed(2);
        const cov=Math.round(82+rnd()*18);
        const isSiang=sh==='SIANG';
        const kasTotal=isSiang?Math.round(m.ideal_kas*(0.85+rnd()*0.3)):'';
        const selisih=isSiang?Math.round((rnd()*240000-120000)/1000)*1000:'';
        const setoranOnTime=isSiang?(rnd()>0.15?'Ya':'Tidak'):'';
        const expiredBelum=belumItems.includes('Cek expired');
        const bigSelisih=isSiang&&Math.abs(selisih)>100000;
        const setoranGagal=setoranOnTime==='Tidak';
        const gate=(expiredBelum||bigSelisih||setoranGagal)?'Ya':'Tidak';
        let komposit=Math.round(sop*0.45+(((kb-1)/4*100))*0.35+cov*0.20);
        let grade=gradeOf(komposit);
        if(gate==='Ya'&&['ANDALAN','BAIK','CUKUP'].includes(grade))grade='PERLU PERHATIAN';
        f1.push({timestamp:ds+' '+(isSiang?'21:05':'08:12'),kode_toko:m.kode_toko,tanggal:ds,shift:sh,pic:m.store_leader,
          sop_persen:sop,sop_tuntas:tuntas,sop_belum:belum,belum_items:belumItems.join('; '),
          kebersihan_avg:kb,coverage_pct:cov,kas_total:kasTotal,selisih_kas:selisih,setoran_ontime:setoranOnTime,
          skor_komposit:komposit,grade,critical_gate:gate,slow_moving:Math.floor(rnd()*4),fast_moving:Math.floor(rnd()*5),foto_link:'#',omzet:Math.round(m.target_setoran*(0.7+rnd()*0.6)),jumlah_transaksi:Math.round(80+rnd()*180)});
      });
    });
  }
  // F2 audits
  const lowPool=['OOS SKU utama','Produk kadaluarsa','Akurasi stok','Selisih kas','FEFO'];
  master.forEach((m,i)=>{
    const n=1+Math.floor(rnd()*2);
    for(let k=0;k<n;k++){
      const tgl=new Date(TODAY); tgl.setDate(tgl.getDate()-Math.floor(rnd()*7));
      const ds=tgl.toISOString().slice(0,10);
      const b=m.cluster==='A'?4.2:m.cluster==='B'?3.8:3.2;
      const sc=()=>+(Math.max(1,Math.min(5,b+(rnd()*1.2-0.6)))).toFixed(2);
      const A=sc(),B=sc(),Cc=sc(),Dd=sc(),E=sc();
      const total=+(A*.2+B*.25+Cc*.2+Dd*.2+E*.15).toFixed(2);
      const pct=Math.round(total/5*100);
      const low=[]; [A,B,Cc,Dd,E].forEach((v,idx)=>{if(v<=2.6&&rnd()>0.5)low.push(lowPool[idx]);});
      const gate=low.length>0&&rnd()>0.5?'Ya':'Tidak';
      let grade=pct>=90?'ANDALAN':pct>=80?'BAIK':pct>=65?'CUKUP':pct>=45?'PERLU PERHATIAN':'KRITIS';
      if(gate==='Ya'&&['ANDALAN','BAIK','CUKUP'].includes(grade))grade='PERLU PERHATIAN';
      f2.push({timestamp:ds+' 10:30',kode_toko:m.kode_toko,tanggal:ds,arco:m.arco,
        skor_A:A,skor_B:B,skor_C:Cc,skor_D:Dd,skor_E:E,total,pct,grade,
        critical_gate:gate,critical_reasons:gate==='Ya'?low.join('; '):'',lowscore_items:low.join('; '),
        closure_rate:Math.round(50+rnd()*50),foto_link:'#'});
    }
  });
  // ACTION ITEMS
  const actDesc=['Planogram popok 4 space kosong','CCTV kasir mati','Toilet bau & tisu habis','FEFO susu belum dirotasi','POP promo belum terpasang','Selisih kas Rp150rb','Stok SKU-A kosong 3 hari','Seragam tidak lengkap'];
  for(let i=0;i<8;i++){
    const m=pick(master); const opened=new Date(TODAY); opened.setDate(opened.getDate()-Math.floor(rnd()*9));
    const tenggat=new Date(opened); tenggat.setDate(tenggat.getDate()+2+Math.floor(rnd()*3));
    const st=pick(['Open','Proses','Selesai','Open','Proses']);
    action.push({id:'A-'+(1000+i),tanggal_dibuka:opened.toISOString().slice(0,10),kode_toko:m.kode_toko,
      sumber:pick(['F1','F2']),deskripsi:actDesc[i],pic:m.store_leader,tenggat:tenggat.toISOString().slice(0,10),
      status:st,tanggal_tutup:st==='Selesai'?TODAY.toISOString().slice(0,10):'',diverifikasi_arco:st==='Selesai'?(rnd()>0.5?'Ya':'Tidak'):'Tidak'});
  }
  // LOG
  const logs=[['Sarana','Listrik padam 30 menit','Perlu Perhatian','Lapor PLN'],['Keluhan','Komplain antrian kasir lama','Perlu Perhatian','Tambah kasir jam sibuk'],['Insiden','Kebocoran atap area gudang','Kritis','Lapor maintenance segera'],['Operasional','Kiriman DC terlambat 2 jam','Normal','Koordinasi dgn DC'],['Penjualan','Promo susu laris, stok menipis','Normal','Reorder cepat'],['Insiden','Dugaan selisih stok SKU mahal','Kritis','Opname mendadak + CCTV'],['Keluhan','Member komplain poin tidak masuk','Normal','Cek sistem POS'],['Sarana','AC bocor di area baby','Perlu Perhatian','Panggil teknisi'],['Operasional','SPG vendor tidak hadir','Normal','Hubungi vendor'],['Penjualan','Capai 120% target harian','Normal','Apresiasi tim']];
  logs.forEach((l,i)=>{const m=pick(master);const tgl=new Date(TODAY);tgl.setDate(tgl.getDate()-Math.floor(rnd()*6));
    log.push({timestamp:tgl.toISOString().slice(0,10)+' '+(10+i)+':05',tanggal:tgl.toISOString().slice(0,10),kode_toko:m.kode_toko,kategori:l[0],deskripsi:l[1],status_kondisi:l[2],tindak_lanjut:l[3]});});
  return {master,f1,f2,action,log};
}

// ════════════ LOAD ════════════
function csvUrl(sheet){return `https://docs.google.com/spreadsheets/d/${CONFIG.spreadsheet_id}/gviz/tq?tqx=out:csv&sheet=${sheet}`;}
function fetchCSV(sheet){return new Promise((res,rej)=>{Papa.parse(csvUrl(sheet),{download:true,header:true,skipEmptyLines:true,complete:r=>res(r.data),error:rej});});}

async function loadAll(){
  document.getElementById('error-box').classList.add('hidden');
  if(CONFIG.spreadsheet_id.includes('PASTE')){
    DATA=SAMPLE(); MODE='DEMO'; afterLoad(); return;
  }
  document.getElementById('loading').classList.remove('hidden');
  try{
    const [master,f1,f2,action,log]=await Promise.all([fetchCSV(CONFIG.sheets.master),fetchCSV(CONFIG.sheets.f1),fetchCSV(CONFIG.sheets.f2),fetchCSV(CONFIG.sheets.action),fetchCSV(CONFIG.sheets.log)]);
    DATA={master,f1,f2,action,log}; MODE='LIVE';
  }catch(e){
    document.getElementById('error-box').textContent='⚠️ Gagal memuat data — periksa koneksi atau URL/ID Google Sheets. Menampilkan data terakhir.';
    document.getElementById('error-box').classList.remove('hidden');
  }
  document.getElementById('loading').classList.add('hidden');
  afterLoad();
}

function afterLoad(){
  document.getElementById('mode-badge').textContent=MODE;
  document.getElementById('mode-badge').style.cssText=MODE==='DEMO'?'background:#fbbf24;color:#78350f':'background:#86efac;color:#065f46';
  document.getElementById('company-name').textContent=CONFIG.nama_perusahaan+' · monitoring multi-cabang';
  document.getElementById('last-update').textContent='Diperbarui: '+new Date().toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  buildFilterOptions(); applyFilters();
}

function buildFilterOptions(){
  const areas=[...new Set(DATA.master.map(m=>m.area))].sort();
  const fa=document.getElementById('f-area'); fa.innerHTML='<option value="">Semua Area</option>'+areas.map(a=>`<option>${a}</option>`).join('');
  const ft=document.getElementById('f-toko'); ft.innerHTML='<option value="">Semua Toko</option>'+DATA.master.map(m=>`<option value="${m.kode_toko}">${m.kode_toko} — ${m.nama_toko}</option>`).join('');
}

// ════════════ FILTER ════════════
function tokoArea(k){const m=DATA.master.find(x=>x.kode_toko===k);return m?m.area:'';}
function tokoNama(k){const m=DATA.master.find(x=>x.kode_toko===k);return m?m.nama_toko:k;}
function masterOf(k){return DATA.master.find(x=>x.kode_toko===k)||{};}
function fotoBtn(v){return (v&&v!=='#'&&String(v).indexOf('http')===0)?`<a href="${v}" target="_blank" class="badge" style="background:#e0e7ff;color:#3730a3;text-decoration:none">📷 Buka</a>`:'<span style="color:#cbd5e1">–</span>';}
function applyFilters(){
  const days=+document.getElementById('f-period').value;
  const area=document.getElementById('f-area').value;
  const toko=document.getElementById('f-toko').value;
  const minD=new Date(TODAY); minD.setDate(minD.getDate()-days+1);
  const keep=r=>{const dt=D(r.tanggal); if(dt&&dt<minD)return false; if(toko&&r.kode_toko!==toko)return false; if(area&&tokoArea(r.kode_toko)!==area)return false; return true;};
  VIEW.master=DATA.master.filter(m=>(!area||m.area===area)&&(!toko||m.kode_toko===toko));
  VIEW.f1=DATA.f1.filter(keep); VIEW.f2=DATA.f2.filter(keep);
  VIEW.action=DATA.action.filter(r=>{if(toko&&r.kode_toko!==toko)return false;if(area&&tokoArea(r.kode_toko)!==area)return false;return true;});
  VIEW.log=DATA.log.filter(keep);
  renderAll();
}

// ════════════ HELPERS UI ════════════
function gradeBadge(g){const c={'ANDALAN':['#fef9c3','#854d0e'],'BAIK':['#dcfce7','#166534'],'CUKUP':['#fef9c3','#854d0e'],'PERLU PERHATIAN':['#ffedd5','#9a3412'],'KRITIS':['#fee2e2','#991b1b']}[g]||['#e2e8f0','#475569'];return `<span class="badge" style="background:${c[0]};color:${c[1]}">${g||'-'}</span>`;}
function pctColor(v,t){return v>=t?'#22c55e':v>=t-15?'#f59e0b':'#ef4444';}
function yn(v){return v==='Ya'?'<span class="badge" style="background:#fee2e2;color:#991b1b">Ya</span>':'<span class="badge" style="background:#dcfce7;color:#166534">Tidak</span>';}
function avg(arr,f){const v=arr.map(f).filter(x=>!isNaN(x)&&x!==null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}

// generic sortable table
const SORT={};
function table(containerId,cols,rows,sortKey){
  if(!SORT[containerId])SORT[containerId]={key:sortKey||cols[0].k,dir:1};
  const s=SORT[containerId];
  const sorted=[...rows].sort((a,b)=>{let x=a[s.key],y=b[s.key];const nx=num(x),ny=num(y);if(!isNaN(nx)&&!isNaN(ny)&&x!==''&&y!==''){return (nx-ny)*s.dir;}return String(x).localeCompare(String(y))*s.dir;});
  const head=cols.map(c=>`<th onclick="sortTable('${containerId}','${c.k}')">${c.t}${s.key===c.k?(s.dir>0?' ▲':' ▼'):''}</th>`).join('');
  const body=sorted.map(r=>`<tr>${cols.map(c=>`<td>${c.f?c.f(r[c.k],r):(r[c.k]??'')}</td>`).join('')}</tr>`).join('')||`<tr><td colspan="${cols.length}" style="text-align:center;color:#94a3b8;padding:24px">Tidak ada data pada filter ini</td></tr>`;
  document.getElementById(containerId).innerHTML=`<div class="tbl-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function sortTable(id,k){const s=SORT[id];if(s.key===k)s.dir*=-1;else{s.key=k;s.dir=1;}renderAll();}
function chart(id,cfg){if(CHARTS[id])CHARTS[id].destroy();const el=document.getElementById(id);if(el)CHARTS[id]=new Chart(el,cfg);}

// ════════════ RENDER ════════════
function renderAll(){renderOverview();renderAudit();renderHarian();renderExceptions();renderAction();renderGap();renderLog();}

function kpiCard(icon,label,val,sub,color){return `<div class="kpi" style="border-left-color:${color}"><div class="flex items-center gap-2 mb-1"><span style="font-size:18px">${icon}</span><span class="text-xs font-bold text-gray-400 uppercase tracking-wide">${label}</span></div><div class="kpi-num" style="color:${color}">${val}</div><div class="text-xs text-gray-400 mt-1">${sub}</div></div>`;}

function renderOverview(){
  const tokoAktif=VIEW.master.filter(m=>m.status==='Aktif').length;
  const completion=Math.round(avg(VIEW.f1,r=>num(r.sop_persen)));
  const siang=VIEW.f1.filter(r=>r.shift==='SIANG'&&r.setoran_ontime);
  const setoranOT=siang.length?Math.round(siang.filter(r=>r.setoran_ontime==='Ya').length/siang.length*100):0;
  const coverage=Math.round(avg(VIEW.f1,r=>num(r.coverage_pct)));
  const visited=new Set(VIEW.f2.map(r=>r.kode_toko)).size;
  const openAct=DATA.action.filter(a=>a.status!=='Selesai').length;
  const perhatian=new Set(VIEW.f1.filter(r=>['PERLU PERHATIAN','KRITIS'].includes(r.grade)).map(r=>r.kode_toko)).size;

  const C=CONFIG;
  const totalOmzet=VIEW.f1.reduce((s,r)=>s+num(r.omzet),0);
  const _days=new Set(VIEW.f1.map(r=>r.tanggal)).size||1;
  const totalTarget=VIEW.master.reduce((s,m)=>s+num(m.target_setoran),0)*_days;
  const omzetAch=totalTarget>0?Math.round(totalOmzet/totalTarget*100):null;
  const kpis=[
    kpiCard('🏪','Toko Aktif',tokoAktif,VIEW.master.length+' toko terpantau','#0ea5e9'),
    kpiCard('🔍','Toko Diaudit',visited,'dari '+VIEW.master.length+' toko (periode)','#6366f1'),
    kpiCard('📋','Task Completion',completion+'%',`target ${C.target_task_completion}%`,pctColor(completion,C.target_task_completion)),
    kpiCard('💰','Setoran On-Time',setoranOT+'%','shift siang','#10b981'),
    kpiCard('⏰','Coverage',coverage+'%',`target ${C.target_coverage}%`,pctColor(coverage,C.target_coverage)),
    kpiCard('💵','Omzet (periode)','Rp'+(totalOmzet/1e6).toFixed(1)+'jt',omzetAch!=null?`${omzetAch}% dari target setoran`:'target setoran belum diisi',omzetAch!=null?pctColor(omzetAch,100):'#0ea5e9'),
  ];
  // area summary
  const areas=[...new Set(VIEW.master.map(m=>m.area))];
  const areaRows=areas.map(a=>{
    const tk=VIEW.master.filter(m=>m.area===a).map(m=>m.kode_toko);
    const f1a=VIEW.f1.filter(r=>tk.includes(r.kode_toko));
    const comp=Math.round(avg(f1a,r=>num(r.sop_persen)));
    const cov=Math.round(avg(f1a,r=>num(r.coverage_pct)));
    const aud=Math.round(avg(VIEW.f2.filter(r=>tk.includes(r.kode_toko)),r=>num(r.pct)));
    const oms=f1a.reduce((s,r)=>s+num(r.omzet),0);
    return {area:a,toko:tk.length,comp,cov,aud,oms};
  });
  // alerts
  const alerts=[];
  VIEW.f1.filter(r=>r.critical_gate==='Ya').forEach(r=>alerts.push({t:'🔴 Critical Gate',toko:r.kode_toko,d:`${r.tanggal} ${r.shift} — ${r.belum_items||'gate aktif'}`}));
  VIEW.f1.filter(r=>r.grade==='KRITIS').forEach(r=>alerts.push({t:'🔴 Kondisi KRITIS',toko:r.kode_toko,d:`${r.tanggal} ${r.shift} — skor ${r.skor_komposit}`}));
  DATA.action.filter(a=>a.status!=='Selesai'&&D(a.tenggat)&&D(a.tenggat)<TODAY).forEach(a=>alerts.push({t:'⏳ Aksi Lewat Tenggat',toko:a.kode_toko,d:`${a.deskripsi} (tenggat ${a.tenggat})`}));
  DATA.log.filter(l=>l.status_kondisi==='Kritis').forEach(l=>alerts.push({t:'⚠️ Log Kritis',toko:l.kode_toko,d:l.deskripsi}));

  document.getElementById('panel-overview').innerHTML=`
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-3">${kpis.join('')}</div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="kpi" style="border-left-color:#f59e0b"><div class="flex items-center gap-2 mb-1"><span>✅</span><span class="text-xs font-bold text-gray-400 uppercase">Aksi Terbuka</span></div><div class="kpi-num" style="color:#f59e0b">${openAct}</div><div class="text-xs text-gray-400 mt-1">perlu tindak lanjut</div></div>
      <div class="kpi" style="border-left-color:#ef4444"><div class="flex items-center gap-2 mb-1"><span>🚨</span><span class="text-xs font-bold text-gray-400 uppercase">Toko Perlu Perhatian</span></div><div class="kpi-num" style="color:#ef4444">${perhatian}</div><div class="text-xs text-gray-400 mt-1">grade ≤ PERLU PERHATIAN</div></div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-3 mb-4">
      <div class="card p-4 lg:col-span-2"><h3 class="font-bold text-gray-700 text-sm mb-2">Tren Task Completion (harian)</h3><canvas id="ch-trend" height="120"></canvas></div>
      <div class="card p-4"><h3 class="font-bold text-gray-700 text-sm mb-2">Sebaran Grade Audit</h3><canvas id="ch-grade" height="120"></canvas></div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-3">
      <div class="card p-4">
        <h3 class="font-bold text-gray-700 text-sm mb-3">Ringkasan per Area</h3>
        <table><thead><tr><th>Area</th><th>Toko</th><th>Completion</th><th>Coverage</th><th>Audit</th><th>Omzet</th></tr></thead><tbody>
        ${areaRows.map(a=>`<tr><td class="font-semibold">${a.area}</td><td>${a.toko}</td>
          <td><span class="badge" style="background:${pctColor(a.comp,90)}22;color:${pctColor(a.comp,90)}">${a.comp}%</span></td>
          <td><span class="badge" style="background:${pctColor(a.cov,90)}22;color:${pctColor(a.cov,90)}">${a.cov}%</span></td>
          <td><span class="badge" style="background:${pctColor(a.aud,80)}22;color:${pctColor(a.aud,80)}">${a.aud||'-'}%</span></td><td class="font-semibold">${fmtRp(a.oms)}</td></tr>`).join('')}
        </tbody></table>
      </div>
      <div class="card p-4">
        <h3 class="font-bold text-gray-700 text-sm mb-3">🔔 Panel Alert (${alerts.length})</h3>
        <div style="max-height:260px;overflow:auto" class="space-y-2">
        ${alerts.length?alerts.map(a=>`<div class="flex gap-2 items-start text-xs p-2 rounded-lg bg-slate-50 border border-slate-100"><span class="font-bold whitespace-nowrap">${a.t}</span><span class="font-bold text-slate-700">${a.toko}</span><span class="text-slate-500">${a.d}</span></div>`).join(''):'<p class="text-sm text-gray-400 text-center py-6">✓ Tidak ada alert pada filter ini</p>'}
        </div>
      </div>
    </div>`;

  // charts
  const dates=[...new Set(VIEW.f1.map(r=>r.tanggal))].sort();
  const trend=dates.map(dt=>Math.round(avg(VIEW.f1.filter(r=>r.tanggal===dt),r=>num(r.sop_persen))));
  chart('ch-trend',{type:'line',data:{labels:dates.map(d=>d.slice(5)),datasets:[{data:trend,borderColor:'#059669',backgroundColor:'rgba(5,150,105,.1)',fill:true,tension:.3,pointRadius:3}]},options:{plugins:{legend:{display:false}},scales:{y:{min:0,max:100}}}});
  const gc={};VIEW.f2.forEach(r=>gc[r.grade]=(gc[r.grade]||0)+1);
  const gOrder=['ANDALAN','BAIK','CUKUP','PERLU PERHATIAN','KRITIS'];
  const gColors={'ANDALAN':'#eab308','BAIK':'#22c55e','CUKUP':'#facc15','PERLU PERHATIAN':'#f97316','KRITIS':'#ef4444'};
  const gl=gOrder.filter(g=>gc[g]);
  chart('ch-grade',{type:'doughnut',data:{labels:gl,datasets:[{data:gl.map(g=>gc[g]),backgroundColor:gl.map(g=>gColors[g])}]},options:{plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:12}}}}});
}

function renderAudit(){
  const cols=[
    {k:'tanggal',t:'Tanggal'},{k:'kode_toko',t:'Toko',f:(v)=>`<b>${v}</b>`},
    {k:'arco',t:'ARCO'},{k:'skor_A',t:'A 🧹'},{k:'skor_B',t:'B 🏪'},{k:'skor_C',t:'C 👥'},{k:'skor_D',t:'D 💰'},{k:'skor_E',t:'E 🌟'},
    {k:'pct',t:'Skor %',f:v=>`<span class="badge" style="background:${pctColor(num(v),80)}22;color:${pctColor(num(v),80)}">${v}%</span>`},
    {k:'grade',t:'Grade',f:v=>gradeBadge(v)},{k:'critical_gate',t:'Gate',f:v=>yn(v)},
    {k:'lowscore_items',t:'Item Rendah',f:v=>v?`<span style="color:#dc2626">${v}</span>`:'-'},
    {k:'critical_reasons',t:'Alasan Gate',f:v=>v?`<span style="color:#dc2626">${v}</span>`:'-'},
    {k:'closure_rate',t:'Closure',f:v=>v+'%'},{k:'foto_link',t:'Foto',f:v=>fotoBtn(v)}
  ];
  const visited=new Set(VIEW.f2.map(r=>r.kode_toko));
  const belum=VIEW.master.filter(m=>!visited.has(m.kode_toko));
  document.getElementById('panel-audit').innerHTML=`
    <div class="grid grid-cols-3 gap-3 mb-4">
      ${kpiCard('🔍','Total Kunjungan',VIEW.f2.length,'periode terpilih','#6366f1')}
      ${kpiCard('📊','Rata-rata Skor',Math.round(avg(VIEW.f2,r=>num(r.pct)))+'%','semua audit','#0ea5e9')}
      ${kpiCard('🚪','Belum Dikunjungi',belum.length,belum.map(b=>b.kode_toko).join(', ')||'-','#f59e0b')}
    </div>
    <div class="card p-4"><h3 class="font-bold text-gray-700 text-sm mb-3">Detail Audit ARCO per Kunjungan</h3><div id="tbl-audit"></div></div>`;
  table('tbl-audit',cols,VIEW.f2,'tanggal');
}

function renderHarian(){
  // heatmap toko x tanggal
  const dates=[...new Set(VIEW.f1.map(r=>r.tanggal))].sort();
  const toks=[...new Set(VIEW.f1.map(r=>r.kode_toko))].sort();
  const hmColor=v=>v>=90?'#22c55e':v>=75?'#84cc16':v>=60?'#f59e0b':'#ef4444';
  const heat=`<div style="overflow-x:auto"><table style="width:auto"><thead><tr><th>Toko</th>${dates.map(d=>`<th style="text-align:center">${d.slice(5)}</th>`).join('')}</tr></thead><tbody>
    ${toks.map(tk=>`<tr><td style="font-weight:700">${tk}</td>${dates.map(d=>{const rows=VIEW.f1.filter(r=>r.kode_toko===tk&&r.tanggal===d);const v=rows.length?Math.round(avg(rows,r=>num(r.sop_persen))):null;return `<td style="text-align:center;padding:3px">${v!==null?`<div class="hm-cell" style="background:${hmColor(v)}">${v}</div>`:'<div class="hm-cell" style="background:#e2e8f0;color:#94a3b8">–</div>'}</td>`;}).join('')}</tr>`).join('')}
    </tbody></table></div>`;

  const cols=[
    {k:'tanggal',t:'Tanggal'},{k:'shift',t:'Shift',f:v=>`<span class="badge" style="background:${v==='PAGI'?'#fef3c7':'#ede9fe'};color:${v==='PAGI'?'#92400e':'#5b21b6'}">${v}</span>`},
    {k:'kode_toko',t:'Toko',f:v=>`<b>${v}</b>`},{k:'pic',t:'PIC'},
    {k:'sop_persen',t:'Task %',f:v=>`<span class="badge" style="background:${pctColor(num(v),90)}22;color:${pctColor(num(v),90)}">${v}%</span>`},
    {k:'belum_items',t:'Belum',f:v=>v?`<span style="color:#dc2626">${v}</span>`:'-'},
    {k:'kebersihan_avg',t:'Kebersihan',f:v=>`⭐${v}`},{k:'coverage_pct',t:'Coverage',f:v=>v+'%'},
    {k:'kas_total',t:'Kas',f:(v,r)=>{if(!v)return '-';const ik=num(masterOf(r.kode_toko).ideal_kas);const c=(ik&&num(v)<ik*0.9)?'#dc2626':'#475569';return '<span style="color:'+c+'">'+fmtRp(v)+'</span>';}},{k:'selisih_kas',t:'Selisih',f:v=>v===''||v===undefined?'-':`<span style="color:${Math.abs(num(v))>100000?'#dc2626':'#475569'}">${fmtRp(v)}</span>`},
    {k:'setoran_ontime',t:'Setor',f:v=>v?yn(v):'-'},
    {k:'omzet',t:'Omzet',f:v=>v?fmtRp(v):'-'},
    {k:'skor_komposit',t:'Skor',f:v=>v},{k:'grade',t:'Grade',f:v=>gradeBadge(v)},{k:'critical_gate',t:'Gate',f:v=>yn(v)},
    {k:'slow_moving',t:'Slow/Fast',f:(v,r)=>`${v||0} / ${r.fast_moving||0}`},{k:'foto_link',t:'Foto',f:v=>fotoBtn(v)}
  ];
  document.getElementById('panel-harian').innerHTML=`
    <div class="card p-4 mb-4"><h3 class="font-bold text-gray-700 text-sm mb-3">🔥 Heatmap Task Completion (Toko × Tanggal)</h3>${heat}
      <div class="flex gap-3 mt-3 text-xs text-gray-500"><span>🟩 ≥90</span><span>🟢 75–89</span><span>🟧 60–74</span><span>🟥 &lt;60</span></div></div>
    <div class="card p-4"><h3 class="font-bold text-gray-700 text-sm mb-1">Setiap Inputan Harian Tim Toko</h3><p class="text-xs text-gray-400 mb-3">${VIEW.f1.length} laporan · klik header untuk sortir</p><div id="tbl-harian"></div></div>`;
  table('tbl-harian',cols,VIEW.f1,'tanggal');
}

function renderExceptions(){
  const freq={};
  VIEW.f1.forEach(r=>String(r.belum_items||'').split(';').map(s=>s.trim()).filter(Boolean).forEach(it=>{freq[it]=freq[it]||{n:0,toko:new Set(),src:'Task SL'};freq[it].n++;freq[it].toko.add(r.kode_toko);}));
  VIEW.f2.forEach(r=>String(r.lowscore_items||'').split(';').map(s=>s.trim()).filter(Boolean).forEach(it=>{freq[it]=freq[it]||{n:0,toko:new Set(),src:'Audit ARCO'};freq[it].n++;freq[it].toko.add(r.kode_toko);}));
  const rows=Object.entries(freq).map(([k,v])=>({item:k,n:v.n,toko:[...v.toko].join(', '),src:v.src})).sort((a,b)=>b.n-a.n);
  const top=rows.slice(0,10);
  document.getElementById('panel-exceptions').innerHTML=`
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-3">
      <div class="card p-4"><h3 class="font-bold text-gray-700 text-sm mb-3">Item Paling Sering Gagal</h3><canvas id="ch-exc" height="${Math.max(120,top.length*26)}"></canvas></div>
      <div class="card p-4"><h3 class="font-bold text-gray-700 text-sm mb-3">Detail Exceptions</h3>
        <table><thead><tr><th>Item</th><th>Frekuensi</th><th>Sumber</th><th>Toko Terdampak</th></tr></thead><tbody>
        ${rows.length?rows.map(r=>`<tr><td class="font-semibold">${r.item}</td><td><span class="badge" style="background:#fee2e2;color:#991b1b">${r.n}×</span></td><td class="text-xs">${r.src}</td><td class="text-xs">${r.toko}</td></tr>`).join(''):'<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:24px">✓ Tidak ada kegagalan pada filter ini</td></tr>'}
        </tbody></table>
      </div>
    </div>`;
  if(top.length)chart('ch-exc',{type:'bar',data:{labels:top.map(r=>r.item),datasets:[{data:top.map(r=>r.n),backgroundColor:'#ef4444'}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{precision:0}}}}});
}

function renderAction(){
  const open=DATA.action.filter(a=>a.status==='Open').length;
  const proses=DATA.action.filter(a=>a.status==='Proses').length;
  const overdue=DATA.action.filter(a=>a.status!=='Selesai'&&D(a.tenggat)&&D(a.tenggat)<TODAY).length;
  const sel=DATA.action.filter(a=>a.status==='Selesai');
  const closureRate=DATA.action.length?Math.round(sel.length/DATA.action.length*100):0;
  const cols=[
    {k:'id',t:'ID'},{k:'tanggal_dibuka',t:'Dibuka'},{k:'kode_toko',t:'Toko',f:v=>`<b>${v}</b>`},{k:'sumber',t:'Sumber'},
    {k:'deskripsi',t:'Deskripsi',f:v=>`<span style="white-space:normal">${v}</span>`},{k:'pic',t:'PIC'},
    {k:'tenggat',t:'Tenggat',f:(v,r)=>{const od=r.status!=='Selesai'&&D(v)&&D(v)<TODAY;return od?`<span style="color:#dc2626;font-weight:700">${v} ⚠</span>`:v;}},
    {k:'status',t:'Status',f:v=>{const c={'Open':['#dbeafe','#1e40af'],'Proses':['#fef9c3','#854d0e'],'Selesai':['#dcfce7','#166534']}[v]||['#e2e8f0','#475569'];return `<span class="badge" style="background:${c[0]};color:${c[1]}">${v}</span>`;}},
    {k:'diverifikasi_arco',t:'Verif ARCO',f:v=>yn(v)}
  ];
  document.getElementById('panel-action').innerHTML=`
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      ${kpiCard('📌','Open',open,'belum dikerjakan','#3b82f6')}
      ${kpiCard('⏳','Proses',proses,'sedang dikerjakan','#f59e0b')}
      ${kpiCard('🔴','Lewat Tenggat',overdue,'perlu eskalasi','#ef4444')}
      ${kpiCard('✓','Closure Rate',closureRate+'%','selesai/total','#22c55e')}
    </div>
    <div class="card p-4"><h3 class="font-bold text-gray-700 text-sm mb-3">Daftar Action Items</h3><div id="tbl-action"></div></div>`;
  table('tbl-action',cols,VIEW.action,'tenggat');
}

function renderGap(){
  const toks=[...new Set(VIEW.master.map(m=>m.kode_toko))];
  const rows=toks.map(tk=>{
    const f1=VIEW.f1.filter(r=>r.kode_toko===tk);
    const f2=VIEW.f2.filter(r=>r.kode_toko===tk);
    if(!f1.length||!f2.length)return null;
    const klaim=Math.round(avg(f1,r=>num(r.skor_komposit)));
    const audit=Math.round(avg(f2,r=>num(r.pct)));
    const gap=audit-klaim;
    return {kode_toko:tk,nama:tokoNama(tk),klaim,audit,gap};
  }).filter(Boolean).sort((a,b)=>a.gap-b.gap);
  const verdict=g=>Math.abs(g)<=7?['✓ Sehat','#22c55e']:g>=-15?['⚠ Coaching','#f59e0b']:['🚩 Eskalasi','#ef4444'];
  document.getElementById('panel-gap').innerHTML=`
    <div class="card p-4 mb-3"><p class="text-sm text-gray-500">Gap = <b>Skor Audit ARCO − Klaim Self-Assessment SL</b> (rata-rata periode). Gap negatif besar = SL cenderung menggelembungkan skor → sinyal integritas.</p></div>
    <div class="card p-4"><h3 class="font-bold text-gray-700 text-sm mb-3">Gap Score per Toko</h3>
    <table><thead><tr><th>Toko</th><th>Nama</th><th>Klaim SL</th><th>Audit ARCO</th><th>Gap</th><th>Verdikt</th></tr></thead><tbody>
    ${rows.length?rows.map(r=>{const[t,c]=verdict(r.gap);return `<tr><td><b>${r.kode_toko}</b></td><td>${r.nama}</td><td>${r.klaim}</td><td>${r.audit}</td>
      <td style="font-weight:800;color:${r.gap<0?'#dc2626':'#16a34a'}">${r.gap>0?'+':''}${r.gap}</td>
      <td><span class="badge" style="background:${c}22;color:${c}">${t}</span></td></tr>`;}).join(''):'<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:24px">Butuh data Form 1 & Form 2 pada toko yang sama</td></tr>'}
    </tbody></table></div>`;
}

function renderLog(){
  const order={'Kritis':0,'Perlu Perhatian':1,'Normal':2};
  const rows=[...VIEW.log].sort((a,b)=>(order[a.status_kondisi]-order[b.status_kondisi])||String(b.tanggal).localeCompare(String(a.tanggal)));
  const katC={'Insiden':['#fee2e2','#991b1b'],'Keluhan':['#ffedd5','#9a3412'],'Operasional':['#dbeafe','#1e40af'],'Penjualan':['#dcfce7','#166534'],'Sarana':['#fef9c3','#854d0e'],'Lainnya':['#e2e8f0','#475569']};
  const kondC={'Kritis':'#ef4444','Perlu Perhatian':'#f59e0b','Normal':'#22c55e'};
  document.getElementById('panel-log').innerHTML=`
    <div class="card p-4"><h3 class="font-bold text-gray-700 text-sm mb-1">Feed Log Kejadian</h3><p class="text-xs text-gray-400 mb-3">${rows.length} kejadian · Kritis ditampilkan paling atas</p>
    <div class="space-y-2">
    ${rows.length?rows.map(l=>{const kc=katC[l.kategori]||katC['Lainnya'];return `
      <div class="p-3 rounded-xl border" style="border-color:${l.status_kondisi==='Kritis'?'#fca5a5':'#e2e8f0'};${l.status_kondisi==='Kritis'?'background:#fef2f2':'background:#fff'}">
        <div class="flex items-center gap-2 flex-wrap mb-1">
          <span class="badge" style="background:${kc[0]};color:${kc[1]}">${l.kategori}</span>
          <span class="badge" style="background:${kondC[l.status_kondisi]}22;color:${kondC[l.status_kondisi]}">${l.status_kondisi}</span>
          <span class="font-bold text-slate-700 text-sm">${l.kode_toko}</span>
          <span class="text-xs text-slate-400 ml-auto">${l.timestamp}</span>
        </div>
        <div class="text-sm text-slate-800 font-medium">${l.deskripsi}</div>
        ${l.tindak_lanjut?`<div class="text-xs text-slate-500 mt-1">↳ Tindak lanjut: ${l.tindak_lanjut}</div>`:''}
      </div>`;}).join(''):'<p class="text-sm text-gray-400 text-center py-8">Tidak ada kejadian pada filter ini</p>'}
    </div></div>`;
}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+t));
}
function clock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleString('id-ID',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
setInterval(clock,30000);clock();
setInterval(loadAll,CONFIG.refresh_interval_ms);
loadAll();
